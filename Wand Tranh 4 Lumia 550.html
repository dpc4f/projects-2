<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[switched to use Notes in ð iPad] Wand Tranh - Note Application For Lumia the Phone</title>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        textarea {
            width: 80%;
            height: 540px;
            font-size: 17px;
            margin: auto;
        }

        button {
            margin-top: 10px;
            padding: 10px;
            font-size: 17px;
        }
    </style>

</head>

<body>
    <h2>White Notes</h2>

    <!-- think of a way to re-use this application -->

    <textarea id="note"></textarea>
    <br>

    <!--
Source - https://stackoverflow.com/a/23332116
Posted by sites, modified by community. See post 'Timeline' for change history
Retrieved 2026-04-25, License - CC BY-SA 4.0
-->

    <input type="file" name="file" id="file">

    <br>

    <button onclick="exportText()">Export TEX</button>
    <button onclick="clearNote()">Clear</button>

    <script>
        function saveNote() {
            var text = document.getElementById("note").value;
            localStorage.setItem("my_note", text);
            alert("Saved into local storage successfully");
        }

        function loadNote() {
            const $output = document.getElementById('note')
            document.getElementById('file').onchange = function () {
                var file = this.files[0];

                var reader = new FileReader();

                reader.onload = function (progressEvent) {
                    // Entire file
                    const text = this.result;
                    $output.innerText = text

                    // By lines
                    var lines = text.split('\n');
                    for (var line = 0; line < lines.length; line++) {
                        console.log(lines[line]);
                    }
                };

                reader.readAsText(file);
            };
        }

        function clearNote() {
            localStorage.removeItem("my_note");
            document.getElementById("note").value = "";
        }

        function exportText() {
            var text = document.getElementById("note").value;
            var blob = new Blob([text], { type: "text/plain" });
            var link = document.createElement("a");

            link.href = URL.createObjectURL(blob);
            link.download = "wand-tranh-note.tex";
            document.body.appendChild(link);
            link.click();

            document.body.removeChild(link);
        }

        window.onload = loadNote;

    </script>

</body>
</html>
