<html lang="en">
<head>
  <title>Flexbox: The flex-direction property</title>
  <link rel="stylesheet" href="layout.css">
  <link rel="stylesheet" href="../code-pen.css">
</head>

<body>

  <main>
  <div class="wrapper">
    <article class="flow">
      <h1>Vertical writing mode example</h1>
      <figure class="callout">
        <p>This flex container has a <code>writing-mode</code> of <code>vertical-rl</code>. A row now runs vertically. Use the select list to change the <code>flex-direction</code>.</p>
      </figure>
      <div class="controls">
        <label for="switcher">Change the flex-direction: </label>
        <select id="switcher">
          <option value="row">row</option>
          <option value="row-reverse">row-reverse</option>
          <option value="column">column</option>
          <option value="column-reverse">column-reverse</option>
        </select>
      </div>
      <div class="container" id="container">
        <div class="box">宮崎友花</div>
        <div class="box">私はFriend Hana-chanに愛します。</div>
        <div class="box">Miyazaki quý phi, con muỗi cái hahah ...</div>
      </div>
    </article>
  </div>
</main>

    <script src="script.js"></script>
</body>

</html>
