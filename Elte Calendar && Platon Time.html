<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elte Calendar w/ Platon Time</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 10px;
            background: #f9f9f9;
        }

        .calendar-container {
            max-width: 780px;
            margin: auto;
            margin-top: 100px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            padding: 10px;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        button {
            padding: 6px 10px;
            font-size: 36px;
            border: none;
            border-radius: 6px;
            background: darkgoldenrod;
            color: lightblue;
            cursor: pointer;
        }

        button:active {
            transform: scale(0.95);
        }

        .buttonCalculate {
            width: 100%;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
            margin-bottom: 10px;
        }

        .buttonCalculate:hover {
            background: #764ba2;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 18px;
        }

        h2 {
            margin: 5px 0;
            font-size: 18px;
        }

        .center {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 5px;
        }

        th,
        td {
            border: 1px solid #ddd;
            text-align: center;
            padding: 6px 0;
            font-size: 24px;
            width: 14.28%;
            color: darkgoldenrod;
        }

        th {
            background: #f0f0f0;
        }

        td {
            height: 40px;
        }

        .TODAY {
            background: lightblue;
            border-radius: 0%;
            font-weight: bold;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);

        }

        #monthYear {
            color: darkgoldenrod;
        }

        #reference {

            font-size: 12px;

        }

        /* Mobile optimization */
        @media (max-width: 580px) {

            th,
            td {
                font-size: 12px;
                padding: 4px 0;
                height: 34px;
            }

            button {
                font-size: 14px;
                padding: 5px 8px;
            }
        }

        .flex-container {
            display: flex;
            min-height: 100vh;
            /* optional: full viewport height */
            width: auto;
        }

        .left-panel,
        .right-panel {
            flex: 1;
            /* each side takes equal width */
            padding: 20px;
        }

        .left-panel {
            background: #f2f2f2;
        }

        .right-panel {
            background: #e0e0ff;
        }

        .left-panel {
            flex: 0 0 70%;
            /* fixed 300px width */
        }

        .right-panel {
            flex: 1;
            /* fills remaining space */
            padding: 50px;
        }

        .platon-time {
            width: auto;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .local-current-time {
            width: auto;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            margin-bottom: 80px;
        }

        em {
            font-size: large;
            font-weight: 900;
            margin-right: 22px;
        }

        .forestry {
            font-size: 30px;
        }


    </style>
</head>

<body>

    <div class="flex-container">
        <div class="left-panel">
            <div class="calendar-container">
                <h1 class="center" id="monthYear"></h1>
                <table>
                    <thead>
                        <tr>
                            <th>Thaw</th>
                            <th>Wan</th>
                            <th>Uth</th>
                            <th>Fri</th>
                            <th>Sat</th>
                            <th>Hie</th>
                            <th>Dak</th>
                        </tr>
                    </thead>
                    <tbody id="calendarBody"></tbody>
                </table>

                <div class="nav">
                    <button onclick="changeMonth(-1)">Prev Month</button>
                    <button onclick="changeMonth(1)">Next Month</button>
                </div>
            </div>
        </div>

        <div class="right-panel">
            <div class="platon-time"><em>Rachael</em> GMT+7-7</div>
            <div id="rachael" class="local-current-time"></div>

            <div class="platon-time"><em class="forestry">서울</em><em>    Osaka</em> GMT+7+2</div>
            <div id="oxaka-seoul" class="local-current-time"></div>

            <div class="platon-time"><em class="forestry">北京</em> GMT+7+1</div>
            <div id="beijing" class="local-current-time"></div>

            <div class="platon-time"><em>Long Xuy^en</em> GMT+7</div>
            <div id="longxuyen" class="local-current-time"></div>

        </div>

    </div>
    </div>


    <script>
        const CURRENT_YEAR = 2020;
        const TODAY = new Date();
        const DAYS_IN_YEAR = 365.25;

        let currentMonth = TODAY.getMonth();
        let currentYear = TODAY.getFullYear();


function formatTime(date, hours = 0) {
    let hr;
  const h = String((hr = date.getHours()+hours) >= 0 ? hr : 24+hr).padStart(2, '0');
  const m = String(date.getMinutes()).padStart(2, '0');
  const s = String(date.getSeconds()).padStart(2, '0');
  return `${h}:${m}:${s}`;
}

function updateTimes() {
  const now = new Date();
 
  
  const oxakaSeoulTime = formatTime(now, additionalHours = 2); // GMT+7+2
  const beijingTime = formatTime(now, additionalHours = 1); // GMT+7+1
  const rachaelTime = formatTime(now, additionalHours = -7); // GMT+7-7
  const longxuyenTime = formatTime(now, additionalHours = 0); // GMT+7

  document.getElementById('oxaka-seoul').textContent = `${oxakaSeoulTime}`;
  document.getElementById('beijing').textContent = `${beijingTime}`;
  document.getElementById('rachael').textContent = `${rachaelTime}`;
  document.getElementById('longxuyen').textContent = `${longxuyenTime}`;
}

// initial render
updateTimes();

// refresh every second
setInterval(updateTimes, 1000);




        function convertCurrentYear() {
            let subtract = currentYear - CURRENT_YEAR;
            return 'current_year+' + subtract.toString();
        }

        function convertReversedCurrentYear(yearStr) {
            const match = yearStr.match(/^current_year([+-]\d+)$/);
            return CURRENT_YEAR + Number(match?.[1] ?? 0);
        }

        function toTuesdayFirst(day) {
            return (day + 5) % 7;
        }

        const monthNames = [
            "January", "February", "March", "April", "May", "June",
            "July", "August", "September", "October", "November", "December"
        ];

        const monthNames_2 = [
            "M11", "M12", "M1", "M2", "M3", "M4",
            "M5", "M6", "M7", "M8", "M9", "M10"
        ];

        function renderCalendar(year, month) {
            document.getElementById("monthYear").textContent =
                monthNames_2[month] + " " + convertCurrentYear(year);

            const firstDay = new Date(year, month, 1);
            const startIndex = toTuesdayFirst(firstDay.getDay());
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            const body = document.getElementById("calendarBody");
            body.innerHTML = "";

            let date = 1;

            for (let r = 0; r < 6; r++) {
                const row = document.createElement("tr");

                for (let c = 0; c < 7; c++) {
                    const cell = document.createElement("td");

                    if (r === 0 && c < startIndex || date > daysInMonth) {
                        cell.textContent = "";
                    } else {
                        cell.textContent = date;

                        if (
                            date === TODAY.getDate() &&
                            month === TODAY.getMonth() &&
                            year === TODAY.getFullYear()
                        ) {
                            cell.classList.add("TODAY");
                        }

                        date++;
                    }

                    row.appendChild(cell);
                }

                body.appendChild(row);
                if (date > daysInMonth) break;
            }
        }

        function changeMonth(step) {
            currentMonth += step;

            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            } else if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }

            renderCalendar(currentYear, currentMonth);
        }

        renderCalendar(currentYear, currentMonth);


    </script>

</body>

</html>
