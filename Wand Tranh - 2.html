<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wand Tranh Used 4 Saving Notes Locally</title>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        textarea {
            width: 50%;
            height: 540px;
            font-size: 12px;
            margin: auto;
        }

        button {
            margin-top: 40px;
            margin-right: 10px;
            padding-left: 14px; 
            padding-right: 14px;
            padding-top: 7px;
            padding-bottom: 7px;
            font-size: 17px;
        }

        input {
            font-size: 17px;
        }
    </style>

</head>

<body>
    <h2>Ayss' Notes</h2>

    <!-- think of a way to re-use this application -->

    <textarea id="note"></textarea>
    <br>

    <!--
Source - https://stackoverflow.com/a/23332116
Posted by sites, modified by community. See post 'Timeline' for change history
Retrieved 2026-04-25, License - CC BY-SA 4.0
-->

    <input type="file" name="file" id="file">

    <br>

    <button onclick="exportText()">Export TEX</button>
    <button onclick="clearNote()">Clear</button>

    <script>
        function loadNote() {
            const $output = document.getElementById('note')
            document.getElementById('file').onchange = function () {
                var file = this.files[0];

                var reader = new FileReader();

                reader.onload = function (progressEvent) {
                    // Entire file
                    const text = this.result;
                    $output.innerHTML = text

                    // By lines
                    var lines = text.split('\r\n');
                    for (var line = 0; line < lines.length; line++) {
                        console.log(lines[line]);
                    }
                };

                reader.readAsText(file);
            };
        }

        function clearNote() {
            document.getElementById("note").value = "";
            document.getElementById("file").value = "";
        }

        function exportText() {
            var text = document.getElementById("note").value;
            var blob = new Blob([text], { type: "text/plain" });
            var link = document.createElement("a");

            link.href = URL.createObjectURL(blob);
            link.download = "wand tranh's note.tex";
            document.body.appendChild(link);
            link.click();

            document.body.removeChild(link);
        }

        window.onload = loadNote;
    </script>

</body>

</html>
