<head>
    <meta charset="UTF-8">

    <style>
        body {

        }

<body>
    <h1 class="center">Beloved Women && Favourite Animals</h1>

    <div class="beloved">
        <div type="text" class="名前" disabled>Thoa Nguyen</div>
        <div type="text" id="DOB-1" disabled>May 10 1987</div>
        <div type="text" id="ANI-1" class="colourAnimal"></div>
    </div>

    <div class="beloved">
        <div type="text" class="名前" disabled>Annabel Yao</div>
        <div type="text" id="DOB-2" disabled>Jan 14 1998</div>
        <div type="text" id="ANI-2" class="colourAnimal"></div>
    </div>

    <div class="beloved">
        <div type="text" class="名前" disabled>Tomoka Miyazaki</div>
        <div type="text" id="DOB-3" disabled>Aug 17 2006</div>
        <div type="text" id="ANI-3" class="colourAnimal"></div>
    </div>

    <div class="beloved">
        <div type="text" class="名前" disabled>吴謹言 /wu jinyan/ (Ngô Cẩn Ngôn / Ngụy Anh Lạc)</div>
        <div type="text" id="DOB-4" disabled>Aug 16 1990</div>
        <div type="text" id="ANI-4" class="colourAnimal"></div>
    </div>



    <div class="infor" id="birthYear-2" disabled></div>



    <div class="infor currentYear" disabled>current_year, 2020</div>

    <script>

        window.onload = function () {
            document.getElementById('DOB-1').innerHTML = convertToElte(document.getElementById('DOB-1').innerHTML);
            document.getElementById('DOB-2').innerHTML = convertToElte(document.getElementById('DOB-2').innerHTML);
            document.getElementById('DOB-3').innerHTML = convertToElte(document.getElementById('DOB-3').innerHTML);
            document.getElementById('DOB-4').innerHTML = convertToElte(document.getElementById('DOB-4').innerHTML);


            document.getElementById('ANI-1').innerHTML = exchange2Animal(convertReversedCurrentYear(document.getElementById('DOB-1').innerHTML.split(' ')[2]));
            document.getElementById('ANI-2').innerHTML = exchange2Animal(convertReversedCurrentYear(document.getElementById('DOB-2').innerHTML.split(' ')[2]));
            document.getElementById('ANI-3').innerHTML = exchange2Animal(convertReversedCurrentYear(document.getElementById('DOB-3').innerHTML.split(' ')[2]));
            document.getElementById('ANI-4').innerHTML = exchange2Animal(convertReversedCurrentYear(document.getElementById('DOB-4').innerHTML.split(' ')[2]));
        }





        const TODAY = new Date();
        const DAYS_IN_YEAR = 365.25;
        const monthNames_2 = [
            "M11", "M12", "M1", "M2", "M3", "M4",
            "M5", "M6", "M7", "M8", "M9", "M10"
        ];

        const CURRENT_YEAR = 2020;

        let currentMonth = TODAY.getMonth();
        let currentYear = TODAY.getFullYear();

        function convertCurrentYear() {
            let subtract = currentYear - CURRENT_YEAR;
            return 'current_year+' + subtract.toString();
        }

        function convertReversedCurrentYear(yearStr) {
            const match = yearStr.match(/^current_year([+-]\d+)$/);
            return CURRENT_YEAR + Number(match?.[1] ?? 0);
        }


        function toTuesdayFirst(day) {
            return (day + 5) % 7;
        }

        const monthNames = [
            "January", "February", "March", "April", "May", "June",
            "July", "August", "September", "October", "November", "December"
        ];



        const animalNames = [
            "Mouse / Rat", "Ox / Bull / Buffalo / Bison / Gayal / Cow", "Tiger / Leopard", "Rabbit / Rapoo", "Long Dragon / Ant", "Snake Family / Centipede",
            "Horse / Sea Horse", "Goat / Maggot", "Monkey / Ape", "Rooster / Chicken", "Dodge / Deer / Duck", "Pig / Boor"
        ];

        function renderCalendar(year, month) {
            document.getElementById("monthYear").textContent =
                monthNames_2[month] + " " + convertCurrentYear(year);

            const firstDay = new Date(year, month, 1);
            const startIndex = toTuesdayFirst(firstDay.getDay());
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            const body = document.getElementById("calendarBody");
            body.innerHTML = "";

            let date = 1;

            for (let r = 0; r < 6; r++) {
                const row = document.createElement("tr");

                for (let c = 0; c < 7; c++) {
                    const cell = document.createElement("td");

                    if (r === 0 && c < startIndex || date > daysInMonth) {
                        cell.textContent = "";
                    } else {
                        cell.textContent = date;

                        if (
                            date === TODAY.getDate() &&
                            month === TODAY.getMonth() &&
                            year === TODAY.getFullYear()
                        ) {
                            cell.classList.add("TODAY");
                        }

                        date++;
                    }

                    row.appendChild(cell);
                }

                body.appendChild(row);
                if (date > daysInMonth) break;
            }
        }

        function changeMonth(step) {
            currentMonth += step;

            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            } else if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }

            renderCalendar(currentYear, currentMonth);
        }


        function calculateAge() {
            const birthDate = document.getElementById('birthDate').value;
            const resultDiv = document.getElementById('result');

            if (!birthDate) {
                resultDiv.textContent = 'Please enter a birth date';
                return;
            }

            const arr = birthDate.trim().split(/\s+/);
            const m = monthNames_2.indexOf(arr[0]);

            if (m === -1 || arr.length < 3) {
                resultDiv.textContent = 'Please use the format "M11 1 current_year+0"';
                return;
            }

            const birthMonthName = monthNames[m];
            const birthYear = convertReversedCurrentYear(arr[2]);
            const convertedBirthDate = `${birthMonthName} ${arr[1]} ${birthYear}`;

            const TODAY = new Date();
            const birth = new Date(convertedBirthDate);
            if (isNaN(birth.getTime())) {
                resultDiv.textContent = 'Invalid birth date format';
                return;
            }

            let dayDiff = Math.floor((TODAY.getTime() - birth.getTime()) / (1000 * 60 * 60 * 24));

            resultDiv.textContent = `You are ${dayDiff.toLocaleString()} days old`;
            document.getElementById('reference').textContent = '~' + (dayDiff / DAYS_IN_YEAR).toFixed(2) + ' years old';
        }

        function convertToElte(aDate) {



            let date;
            if (aDate.isNaN) {
                date = new Date();
            }
            else {
                date = new Date(aDate);
            }

            if (isNaN(date.getTime())) {
                alert("Invalid date format. Please use a format like 'Dec 13 2011'.");
                return;
            }

            let month = date.getMonth();
            let day = date.getDate();
            let year = date.getFullYear();

            const elteMonth = monthNames_2[month];



            let elteYear;
            if (month <= 2) year--;
            if (year >= CURRENT_YEAR)
                elteYear = 'current_year+' + (year - CURRENT_YEAR).toString();
            else
                elteYear = 'current_year-' + (CURRENT_YEAR - year).toString();


            const elteDOB = `${elteMonth} ${day} ${elteYear}`;
            return elteDOB;
        }

        document.getElementById('birthYear-2').innerHTML = convertToElte(new Date());
        exchange2Animal();

        function copypaste2BirthYear(aDate) {
            document.getElementById('birthYear-2').value = convertToElte(new Date(aDate));
        }

        function fromElte() {
            const elteDOB = document.getElementById('birthYear-2').value;
            const arr = elteDOB.trim().split(/\s+/);
            const m = monthNames_2.indexOf(arr[0]);

            if (m === -1 || arr.length < 3) {
                alert('Please use the format "M11 1 current_year+0"');
                return;
            }

            const birthMonthName = monthNames[m];
            const birthYear = convertReversedCurrentYear(arr[2]);
            const convertedBirthDate = `${birthMonthName} ${arr[1]} ${birthYear}`;

            // document.getElementById('birthYear-2').value = birthYear;
            exchange2Animal(birthYear);
        }

        function exchange2Animal(birthYear) {
            while (birthYear < CURRENT_YEAR) {
                birthYear += 12;
            }
            return animalNames[(birthYear - CURRENT_YEAR) % 12];
        }





    </script>

</body>

</html>
